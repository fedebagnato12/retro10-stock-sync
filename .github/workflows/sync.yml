name: Stock Sync — Retro 10 / Club 90

on:
  # schedule:
  #   - cron: '*/10 * * * *'  # PAUSADO
  workflow_dispatch:          # solo manual por ahora

concurrency:
  group: stock-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Sync stock
        env:
          STORE_A_ID:    ${{ secrets.STORE_A_ID }}
          STORE_A_TOKEN: ${{ secrets.STORE_A_TOKEN }}
          STORE_B_ID:    ${{ secrets.STORE_B_ID }}
          STORE_B_TOKEN: ${{ secrets.STORE_B_TOKEN }}
        run: python stock/sync_stock.py

      - name: Guardar estado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add stock/sync_state.json
          git diff --staged --quiet || git commit -m "sync state"
          git push
